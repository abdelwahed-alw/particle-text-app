<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelwahed - Interactive Portfolio</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        
        /* حاوية الكاميرا والرسم معاً */
        #video-container {
            position: absolute; bottom: 20px; left: 20px; 
            width: 240px; height: 180px;
            border-radius: 10px; border: 2px solid #333; 
            z-index: 10; overflow: hidden;
            background: #000;
        }

        /* الفيديو واللوحة الشفافة يتطابقان كلياً ومقلوبان كالمرآة */
        #webcam, #output_canvas {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm"
            }
        }
    </script>

</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <!-- اللوحة الشفافة التي سنرسم عليها الخطوط الزرقاء -->
        <canvas id="output_canvas"></canvas> 
    </div>
 <script type="module" src="/src/main.js"></script>t>
    
</body>
</html>
